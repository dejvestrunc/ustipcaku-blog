server {
    listen 80;
    server_name blog.ustipcaku.cz;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;

    # Static assets that change with filename (CSS/JS bundles, fonts)
    location ~* \.(css|js|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Images - cache but allow revalidation (images can be regenerated with same filename)
    location ~* \.(jpg|jpeg|png|gif|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        etag on;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
